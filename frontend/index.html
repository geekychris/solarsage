<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/solarsage.png" />
    <link rel="apple-touch-icon" href="/solarsage.png" />
    <meta name="theme-color" content="#0e1116" />
    <meta name="description" content="SolarSage — monitor, predict, and optimize your EG4 solar system." />
    <title>SolarSage</title>
    <script>
      // Apply the persisted theme before the CSS paints, otherwise
      // there's a flash of the default (dark) theme on every reload.
      (function () {
        try {
          var t = localStorage.getItem("eg4.theme");
          if (t === "light") {
            document.documentElement.setAttribute("data-theme", "light");
          }
        } catch (e) { /* localStorage disabled — leave default */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
